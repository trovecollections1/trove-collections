# Builds the Astro site and deploys to Cloudflare Pages.
#
# !!! AUTO-DEPLOY ON PUSH IS DISABLED !!!
# The local Site Code has 89+ items and many new pages that aren't
# in this repo yet. If push-trigger were active, every CMS edit would
# REPLACE the live site with this stale repo state and shrink it.
# Re-enable the 'on: push' trigger after the full local-to-repo sync
# is complete. For now this workflow can only be run manually
# (Actions tab -> Deploy to Cloudflare Pages -> Run workflow).
#
# Required GitHub repository secrets:
#   - CLOUDFLARE_API_TOKEN   (token scoped to "Cloudflare Pages: Edit")
#   - CLOUDFLARE_ACCOUNT_ID  (7d28019455b6eb70bb92bc5aa3488ac0)

name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=trove-collections --branch=main
