# Builds the Astro site and deploys to Cloudflare Pages on every push to main.
# Bypasses the broken Cloudflare-GitHub OAuth integration entirely by using
# the Cloudflare API directly with an account-scoped API token.
#
# Required GitHub repository secrets:
#   - CLOUDFLARE_API_TOKEN   (token scoped to "Cloudflare Pages: Edit")
#   - CLOUDFLARE_ACCOUNT_ID  (7d28019455b6eb70bb92bc5aa3488ac0)

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=trove-collections --branch=main

